services:
  backend:
    image: node:22-alpine
    working_dir: /workspace/apps/demo-backend
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - ../..:/workspace

  frontend:
    image: node:22-alpine
    working_dir: /workspace/apps/demo-frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:3000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
    depends_on:
      - backend
